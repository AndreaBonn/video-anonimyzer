name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.11.4"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --junitxml=test-results.xml

      - name: Generate test badge
        if: always() && matrix.python-version == '3.13' && github.ref == 'refs/heads/main'
        run: |
          python -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          tests = int(root.attrib.get('tests', 0))
          failures = int(root.attrib.get('failures', 0))
          errors = int(root.attrib.get('errors', 0))
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badge
        if: always() && matrix.python-version == '3.13' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json
          git diff --cached --quiet || git commit -m "ci: update test badge [skip ci]"
          git push
